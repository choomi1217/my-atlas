<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>조영미 — QA Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #faf9ff;
      --surface2: #f3f0ff;
      --border: #e4dff7;
      --text: #1a1523;
      --text2: #4a4458;
      --text3: #9d8fbf;
      --accent: #8B5CF6;
      --accent-light: #f0ebff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.7; }
    .page { max-width: 900px; margin: 0 auto; padding: 4rem 2rem 6rem; }

    /* ── HEADER ── */
    .header { margin-bottom: 0; padding-bottom: 2.5rem; border-bottom: 2px solid var(--accent); }
    .name { font-size: 32px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 14px; }
    .header-row { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1.5rem; }
    .role-badge { display: inline-block; font-size: 13px; font-weight: 500; color: var(--accent); background: var(--accent-light); padding: 6px 18px; border-radius: 999px; margin-bottom: 10px; }
    .header-meta { display: flex; gap: 20px; flex-wrap: wrap; }
    .header-meta span { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--text3); }
    .career-box { text-align: right; }
    .career-num { font-family: 'DM Mono', monospace; font-size: 32px; font-weight: 500; line-height: 1; }
    .career-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

    /* ── TABS ── */
    .tab-bar { display: flex; gap: 0; margin-bottom: 3rem; }
    .tab { flex: 1; text-align: center; padding: 14px 0; font-size: 15px; font-weight: 500; color: var(--text3); background: var(--surface); border: 1px solid var(--border); border-top: none; cursor: pointer; transition: all 0.2s; text-decoration: none; }
    .tab:first-child { border-radius: 0 0 0 10px; }
    .tab:last-child { border-radius: 0 0 10px 0; }
    .tab:hover { color: var(--text2); background: var(--surface2); }
    .tab.active { color: var(--accent); background: var(--bg); border-bottom-color: transparent; font-weight: 700; position: relative; }
    .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--accent); }

    /* ── SECTION ── */
    .section { margin-bottom: 3rem; }
    .section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 2rem; }
    .section-title { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text); white-space: nowrap; }
    .section-line { flex: 1; height: 1px; background: var(--border); }

    /* ── CONTENT CARD ── */
    .intro-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px 28px; margin-bottom: 20px; }
    .intro-card h3 { font-size: 17px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.01em; }
    .intro-card p { font-size: 15px; color: var(--text2); line-height: 1.85; margin-bottom: 12px; }
    .intro-card p:last-child { margin-bottom: 0; }

    .footer { text-align: center; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border); letter-spacing: 0.04em; }

    @media (max-width: 680px) {
      .page { padding: 2.5rem 1.25rem 4rem; }
      .header-row { flex-direction: column; align-items: flex-start; }
      .career-box { text-align: left; }
      .name { font-size: 28px; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="name">조영미</div>
    <div class="header-row">
      <div>
        <div class="role-badge">QA Engineer</div>
        <div class="header-meta">
          <span>choomi1217@gmail.com</span>
        </div>
      </div>
      <div class="career-box">
        <div class="career-num">4Y 4M</div>
        <div class="career-sub">개발 3년 · QA 1년</div>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tab-bar">
    <a class="tab active" href="intro.html">자기소개서</a>
    <a class="tab" href="resume.html">경력기술서</a>
  </div>

  <!-- 자기소개서 본문 -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">About Me</span>
      <div class="section-line"></div>
    </div>

    <div class="intro-card">
      <h3>지원 동기</h3>
      <p><!-- 내용을 채워주세요 --></p>
    </div>

    <div class="intro-card">
      <h3>QA로의 전환</h3>
      <p><!-- 내용을 채워주세요 --></p>
    </div>

    <div class="intro-card">
      <h3>강점</h3>
      <p><!-- 내용을 채워주세요 --></p>
    </div>

    <div class="intro-card">
      <h3>앞으로의 방향</h3>
      <p><!-- 내용을 채워주세요 --></p>
    </div>
  </div>

  <div class="footer">choomi1217@gmail.com</div>
</div>
</body>
</html>
