name: E2E Tests & Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'qa/**'
      - 'docker-compose*.yml'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'qa/**'
      - 'docker-compose*.yml'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

jobs:
  api-e2e:
    name: API E2E Tests (Playwright request fixture)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: myatlas_e2etest
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant gradlew permission
        run: chmod +x backend/gradlew

      - name: Start backend application
        working-directory: ./backend
        run: |
          ./gradlew bootRun &
          sleep 10
          # Wait for backend to be ready
          timeout 120 bash -c 'until curl -sf http://localhost:8080/actuator/health; do sleep 2; done'
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/myatlas_e2etest
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-test-dummy-anthropic-key' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-dummy-openai-key' }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: qa/package-lock.json

      - name: Install qa dependencies
        working-directory: ./qa
        run: npm ci

      - name: Run API E2E tests
        working-directory: ./qa
        run: npm run e2e:api
        env:
          API_URL: http://localhost:8080
          BASE_URL: http://localhost:8080

      - name: Upload API E2E test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-e2e-report
          path: qa/playwright-report/
          retention-days: 30

  ui-e2e:
    name: UI E2E Tests (Playwright browser)
    runs-on: ubuntu-latest
    needs: api-e2e

    steps:
      - uses: actions/checkout@v4

      - name: Create .env file for Docker Compose
        run: |
          cat > .env << 'ENVEOF'
          POSTGRES_DB=myatlas
          POSTGRES_USER=myqaweb
          POSTGRES_PASSWORD=admin
          SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/myatlas
          SPRING_DATASOURCE_USERNAME=myqaweb
          SPRING_DATASOURCE_PASSWORD=admin
          VITE_API_BASE_URL=http://localhost:8080
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY || 'sk-test-dummy-anthropic-key' }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY || 'sk-test-dummy-openai-key' }}
          ENVEOF

      - name: Start Docker Compose stack
        run: |
          docker volume create my-atlas_pgdata
          docker compose -f docker-compose.db.yml -f docker-compose.yml up -d --build
          echo "Waiting for services to be healthy..."
          timeout 120 bash -c 'until curl -sf http://localhost:8080/actuator/health; do sleep 3; done'
          echo "Backend is healthy"
          timeout 60 bash -c 'until curl -sf http://localhost:5173; do sleep 3; done'
          echo "Frontend is ready"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: qa/package-lock.json

      - name: Install qa dependencies
        working-directory: ./qa
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./qa
        run: npx playwright install --with-deps chromium

      - name: Run UI E2E tests
        working-directory: ./qa
        run: npm run e2e:ui
        env:
          BASE_URL: http://localhost:5173
          API_URL: http://localhost:8080
          CI: true

      - name: Upload UI E2E test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-e2e-report
          path: qa/playwright-report/
          retention-days: 30

      - name: Upload Playwright test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-junit-results
          path: qa/playwright-results.xml
          retention-days: 30

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose -f docker-compose.db.yml -f docker-compose.yml down -v

  deploy-gate:
    name: AWS Deploy Gate
    runs-on: ubuntu-latest
    needs: [api-e2e, ui-e2e]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'

    steps:
      - name: Check AWS credentials available
        id: check-aws
        run: |
          if [ -z "$AWS_REGION" ]; then
            echo "AWS_REGION not set, skipping deployment"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}

      - name: E2E passed — ready to deploy
        run: echo "All E2E tests passed. Proceeding to deployment..."

    outputs:
      skip: ${{ steps.check-aws.outputs.skip }}

  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs: deploy-gate
    if: needs.deploy-gate.outputs.skip != 'true'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/my-atlas
            git pull origin main
            docker compose up -d --build backend
            echo "Waiting for backend to start..."
            for i in 1 2 3 4 5 6; do
              sleep 10
              if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
                echo "Backend deployed successfully!"
                exit 0
              fi
              echo "Attempt $i: backend not ready yet..."
            done
            echo "Backend failed to start within 60s"
            docker logs myqaweb-backend --tail 30
            exit 1

  deploy-frontend:
    name: Deploy Frontend to S3/CloudFront
    runs-on: ubuntu-latest
    needs: deploy-gate
    if: needs.deploy-gate.outputs.skip != 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build for production
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.BACKEND_API_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Deploy to S3
        run: aws s3 sync frontend/dist/ s3://my-atlas-frontend/ --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id EVMWQ4ZH85AXV --paths "/*"

  notify-slack:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [api-e2e, ui-e2e, deploy-backend, deploy-frontend]
    if: ${{ always() }}
    steps:
      - name: Determine results
        id: results
        run: |
          # E2E results
          if [ "${{ needs.api-e2e.result }}" = "success" ] && [ "${{ needs.ui-e2e.result }}" = "success" ]; then
            echo "e2e=passed" >> $GITHUB_OUTPUT
          else
            echo "e2e=failed" >> $GITHUB_OUTPUT
          fi
          # Deploy results
          if [ "${{ needs.deploy-backend.result }}" = "skipped" ]; then
            echo "deploy=skipped" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy-backend.result }}" = "success" ] && [ "${{ needs.deploy-frontend.result }}" = "success" ]; then
            echo "deploy=success" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy-backend.result }}" = "failure" ] || [ "${{ needs.deploy-frontend.result }}" = "failure" ]; then
            echo "deploy=failed" >> $GITHUB_OUTPUT
          else
            echo "deploy=skipped" >> $GITHUB_OUTPUT
          fi
          # Overall
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "icon=❌" >> $GITHUB_OUTPUT
            echo "status=Failed" >> $GITHUB_OUTPUT
          else
            echo "icon=✅" >> $GITHUB_OUTPUT
            echo "status=Passed" >> $GITHUB_OUTPUT
          fi
          # Commit message: first line only, truncate 72 chars, JSON-escape
          COMMIT_MSG=$(echo "$COMMIT_MESSAGE" | head -1 | cut -c1-72)
          COMMIT_MSG=$(echo "$COMMIT_MSG" | sed 's/\\/\\\\/g; s/"/\\"/g')
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}

      - name: Build deploy status text
        id: deploy-text
        run: |
          if [ "${{ steps.results.outputs.deploy }}" = "skipped" ]; then
            echo "text=_(develop — deploy skipped)_" >> $GITHUB_OUTPUT
          elif [ "${{ steps.results.outputs.deploy }}" = "success" ]; then
            echo "text=🚀 Backend + Frontend 배포 완료" >> $GITHUB_OUTPUT
          else
            echo "text=⚠️ 배포 실패" >> $GITHUB_OUTPUT
          fi

      - name: Notify Slack
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ steps.results.outputs.icon }} *E2E Tests & Deploy* ${{ steps.results.outputs.status }} on ${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "${{ steps.results.outputs.icon }} E2E Tests & Deploy — ${{ steps.results.outputs.status }}" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                    { "type": "mrkdwn", "text": "*Commit:*\n${{ steps.results.outputs.commit_msg }}" },
                    { "type": "mrkdwn", "text": "*E2E:*\n${{ steps.results.outputs.e2e == 'passed' && '✅ Passed' || '❌ Failed' }}" },
                    { "type": "mrkdwn", "text": "*Deploy:*\n${{ steps.deploy-text.outputs.text }}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Workflow Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
