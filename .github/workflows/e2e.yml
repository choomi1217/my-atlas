name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  api-e2e:
    name: API E2E Tests (Playwright request fixture)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: myatlas_e2etest
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant gradlew permission
        run: chmod +x backend/gradlew

      - name: Start backend application
        working-directory: ./backend
        run: |
          ./gradlew bootRun &
          sleep 10
          # Wait for backend to be ready
          timeout 120 bash -c 'until curl -sf http://localhost:8080/actuator/health; do sleep 2; done'
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/myatlas_e2etest
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-test-dummy-anthropic-key' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-dummy-openai-key' }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: qa/package-lock.json

      - name: Install qa dependencies
        working-directory: ./qa
        run: npm ci

      - name: Run API E2E tests
        working-directory: ./qa
        run: npm run e2e:api
        env:
          API_URL: http://localhost:8080
          BASE_URL: http://localhost:8080

      - name: Upload API E2E test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-e2e-report
          path: qa/playwright-report/
          retention-days: 30

  ui-e2e:
    name: UI E2E Tests (Playwright browser)
    runs-on: ubuntu-latest
    needs: api-e2e

    steps:
      - uses: actions/checkout@v4

      - name: Create .env file for Docker Compose
        run: |
          cat > .env << 'ENVEOF'
          POSTGRES_DB=myatlas
          POSTGRES_USER=myqaweb
          POSTGRES_PASSWORD=admin
          SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/myatlas
          SPRING_DATASOURCE_USERNAME=myqaweb
          SPRING_DATASOURCE_PASSWORD=admin
          VITE_API_BASE_URL=http://localhost:8080
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY || 'sk-test-dummy-anthropic-key' }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY || 'sk-test-dummy-openai-key' }}
          ENVEOF

      - name: Start Docker Compose stack
        run: |
          docker compose up -d --build
          echo "Waiting for services to be healthy..."
          timeout 120 bash -c 'until curl -sf http://localhost:8080/actuator/health; do sleep 3; done'
          echo "Backend is healthy"
          timeout 60 bash -c 'until curl -sf http://localhost:5173; do sleep 3; done'
          echo "Frontend is ready"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: qa/package-lock.json

      - name: Install qa dependencies
        working-directory: ./qa
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./qa
        run: npx playwright install --with-deps chromium

      - name: Run UI E2E tests
        working-directory: ./qa
        run: npm run e2e:ui
        env:
          BASE_URL: http://localhost:5173
          API_URL: http://localhost:8080
          CI: true

      - name: Upload UI E2E test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-e2e-report
          path: qa/playwright-report/
          retention-days: 30

      - name: Upload Playwright test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-junit-results
          path: qa/playwright-results.xml
          retention-days: 30

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose down -v

  deploy-gate:
    name: AWS Deploy Gate
    runs-on: ubuntu-latest
    needs: [api-e2e, ui-e2e]
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Check E2E tests passed
        run: |
          echo "All E2E tests passed successfully!"
          echo "Ready for AWS deployment..."
          # TODO: Add actual AWS deployment commands here
          # Examples:
          # aws ecs update-service --cluster myatlas-cluster --service myatlas-backend --force-new-deployment
          # aws ecs update-service --cluster myatlas-cluster --service myatlas-frontend --force-new-deployment

  notify-slack:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [api-e2e, ui-e2e, deploy-gate]
    if: ${{ always() }}
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ contains(needs.*.result, 'failure') && '❌' || '✅' }} *${{ github.workflow }}* ${{ contains(needs.*.result, 'failure') && 'failed' || 'passed' }} on ${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "${{ contains(needs.*.result, 'failure') && '❌' || '✅' }} ${{ github.workflow }} ${{ contains(needs.*.result, 'failure') && 'Failed' || 'Passed' }}" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Repository:*\n${{ github.repository }}" },
                    { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                    { "type": "mrkdwn", "text": "*Commit:*\n${{ github.event.head_commit.message }}" },
                    { "type": "mrkdwn", "text": "*Author:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Workflow Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
