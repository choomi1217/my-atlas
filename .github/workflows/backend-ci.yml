name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: qa_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: myatlas_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x backend/gradlew

      - name: Build with Gradle
        run: |
          cd backend
          ./gradlew build --no-daemon
        env:
          # TODO: Replace with actual backend-specific env vars if needed
          POSTGRES_URL: jdbc:postgresql://localhost:5432/myatlas_test_db
          POSTGRES_USER: qa_user
          POSTGRES_PASSWORD: test_password

      - name: Run Tests
        run: |
          cd backend
          ./gradlew test --no-daemon
        env:
          POSTGRES_URL: jdbc:postgresql://localhost:5432/myatlas_test_db
          POSTGRES_USER: qa_user
          POSTGRES_PASSWORD: test_password

      # TODO: Add JaCoCo plugin to build.gradle, then uncomment below
      # - name: Generate Test Coverage Report
      #   run: |
      #     cd backend
      #     ./gradlew test jacocoTestReport --no-daemon
      #
      # - name: Verify Test Coverage (70% minimum)
      #   run: |
      #     cd backend
      #     ./gradlew jacocoTestCoverageVerification --no-daemon
      #   continue-on-error: true
      #
      # - name: Upload Coverage to Codecov (optional)
      #   uses: codecov/codecov-action@v4
      #   with:
      #     files: ./backend/build/reports/jacoco/test/jacocoTestReport.xml
      #     flags: backend
      #     name: backend-coverage
      #   continue-on-error: true

      - name: Publish Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/build/reports/tests/test/
          retention-days: 30

      # TODO: Uncomment when JaCoCo plugin is added to build.gradle
      # - name: Publish JaCoCo Coverage Report
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: backend-jacoco-reports
      #     path: backend/build/reports/jacoco/
      #     retention-days: 30

  build-docker:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    # TODO: Update docker registry, image name, and credentials
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: myatlas-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

