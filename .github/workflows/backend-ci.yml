name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: qa_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: myatlas_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x backend/gradlew

      - name: Build with Gradle
        run: |
          cd backend
          ./gradlew build --no-daemon
        env:
          # TODO: Replace with actual backend-specific env vars if needed
          POSTGRES_URL: jdbc:postgresql://localhost:5432/myatlas_test_db
          POSTGRES_USER: qa_user
          POSTGRES_PASSWORD: test_password

      - name: Run Tests
        run: |
          cd backend
          ./gradlew test --no-daemon
        env:
          POSTGRES_URL: jdbc:postgresql://localhost:5432/myatlas_test_db
          POSTGRES_USER: qa_user
          POSTGRES_PASSWORD: test_password

      - name: Generate Test Coverage Report
        run: |
          cd backend
          ./gradlew test jacocoTestReport --no-daemon

      - name: Verify Test Coverage (70% minimum)
        run: |
          cd backend
          ./gradlew jacocoTestCoverageVerification --no-daemon
        continue-on-error: true  # TODO: Remove 'continue-on-error' once coverage meets 70% threshold

      - name: Upload Coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/build/reports/jacoco/test/jacocoTestReport.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true  # Codecov optional for now

      - name: Publish Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/build/reports/tests/test/
          retention-days: 30

      - name: Publish JaCoCo Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-reports
          path: backend/build/reports/jacoco/
          retention-days: 30

  build-docker:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    # TODO: Update docker registry, image name, and credentials
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: myatlas-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # TODO: Uncomment and configure below for actual Docker registry push (requires registry credentials in GitHub Secrets)
      # - name: Login to Docker Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io  # Change if using different registry
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
      #
      # - name: Push Docker image
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: ./backend
      #     file: ./backend/Dockerfile
      #     push: true
      #     tags: ghcr.io/${{ github.repository }}/backend:latest
      #     cache-from: type=gha
      #     cache-to: type=gha,mode=max

  notify-slack:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [build-and-test, build-docker]
    if: ${{ always() }}
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ contains(needs.*.result, 'failure') && '❌' || '✅' }} *${{ github.workflow }}* ${{ contains(needs.*.result, 'failure') && 'failed' || 'passed' }} on ${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "${{ contains(needs.*.result, 'failure') && '❌' || '✅' }} ${{ github.workflow }} ${{ contains(needs.*.result, 'failure') && 'Failed' || 'Passed' }}" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Repository:*\n${{ github.repository }}" },
                    { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                    { "type": "mrkdwn", "text": "*Commit:*\n${{ github.event.head_commit.message }}" },
                    { "type": "mrkdwn", "text": "*Author:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Workflow Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
