spring:
  datasource:
    url: jdbc:h2:mem:test
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  ai:
    anthropic:
      api-key: test-key-do-not-use
    openai:
      api-key: test-key-do-not-use

jwt:
  secret: test-secret-key-for-unit-tests-only-32bytes-long!!
  expiration-ms: 86400000

feature:
  embedding:
    enabled: true

app:
  s3:
    image-bucket: test-bucket
    region: ap-northeast-2
    access-key: test
    secret-key: test
