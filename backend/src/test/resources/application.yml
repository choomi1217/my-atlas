spring:
  datasource:
    url: jdbc:h2:mem:test
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  ai:
    anthropic:
      api-key: test-key-do-not-use
    openai:
      api-key: test-key-do-not-use

feature:
  embedding:
    enabled: true
