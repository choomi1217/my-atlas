spring:
  application:
    name: my-qa-web

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/myqaweb}
    username: ${SPRING_DATASOURCE_USERNAME:myqaweb}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-3-5-sonnet-20241022
          max-tokens: 2048
    openai:
      api-key: ${OPENAI_API_KEY:}
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        dimensions: 1536
        distance-type: COSINE_DISTANCE
        initialize-schema: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Feature embedding configuration
feature:
  embedding:
    enabled: ${FEATURE_EMBEDDING_ENABLED:false}
