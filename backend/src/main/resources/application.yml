spring:
  application:
    name: my-qa-web

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/myqaweb}
    username: ${SPRING_DATASOURCE_USERNAME:myqaweb}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false
    ignore-migration-patterns: "*:missing"
    out-of-order: true

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-haiku-4-5-20251001
          max-tokens: 2048
    openai:
      api-key: ${OPENAI_API_KEY:}
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        dimensions: 1536
        distance-type: COSINE_DISTANCE
        initialize-schema: false

jwt:
  secret: ${JWT_SECRET:my-atlas-default-secret-key-for-development-only-32bytes!!}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.myqaweb: DEBUG

# CORS configuration
app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://*.cloudfront.net,https://youngmi.works}
  s3:
    image-bucket: ${S3_IMAGE_BUCKET:my-atlas-images}
    region: ${AWS_REGION:ap-northeast-2}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}

# Feature configuration
feature:
  embedding:
    enabled: ${FEATURE_EMBEDDING_ENABLED:false}
  image:
    upload-dir: ${FEATURE_IMAGE_UPLOAD_DIR:feature-images}

# KB image upload
kb:
  image:
    upload-dir: ${KB_IMAGE_UPLOAD_DIR:kb-images}
  pdf:
    cleanup:
      # v7: Haiku-based chunk refinement during PDF upload.
      # Set to false for legacy v6 rule-based chunking (rollback).
      enabled: ${KB_PDF_CLEANUP_ENABLED:true}

# Jira integration
jira:
  base-url: ${JIRA_BASE_URL:}
  email: ${JIRA_EMAIL:}
  api-key: ${JIRA_API_KEY:}
  default-project-key: AT
  issue-type-id: "10042"

# Statistics configuration
statistics:
  readiness:
    max-highest-open: 0
    max-high-open: 2
    min-regression-pass-rate: 98.0
    aging-threshold-days: 3

# Slack integration
slack:
  webhook:
    url: ${SLACK_WEBHOOK_URL:}

# Convention image upload
convention:
  image:
    upload-dir: ${CONVENTION_IMAGE_UPLOAD_DIR:convention-images}
